apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-web
  namespace: lux
  labels:
    app: cloud-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-web
  template:
    metadata:
      labels:
        app: cloud-web
    spec:
      containers:
        - name: web
          image: ghcr.io/luxfi/cloud:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_IAM_HOST
              value: https://lux.id
            - name: NEXT_PUBLIC_API_HOST
              value: https://api.lux.cloud
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-web
  namespace: lux
spec:
  selector:
    app: cloud-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
