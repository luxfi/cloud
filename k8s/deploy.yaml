apiVersion: v1
kind: Namespace
metadata:
  name: lux-cloud
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: lux-cloud
spec:
  podSelector: {}
  ingress:
  - {}
  policyTypes:
  - Ingress
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud
  namespace: lux-cloud
  labels:
    app: cloud
    app.kubernetes.io/part-of: lux-cloud
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud
  template:
    metadata:
      labels:
        app: cloud
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: cloud
        image: ghcr.io/luxfi/cloud:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: NEXT_PUBLIC_ANALYTICS_URL
          value: https://analytics.hanzo.ai/script.js
        - name: NEXT_PUBLIC_ANALYTICS_SITE_ID
          value: d54f7730-8743-4ef1-9e02-1b10f456b798
        readinessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10
        livenessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        resources:
          requests: { cpu: 500m, memory: 1Gi }
          limits: { cpu: "2", memory: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: cloud
  namespace: lux-cloud
  labels:
    app: cloud
spec:
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: cloud
  type: ClusterIP
